syntax = "proto3";

package ics_patcher_v2;

option csharp_namespace = "IcsPatcherV2";

// V2 patcher definitions - adds timestamps and different field ordering

message FileChange {
    string             filename   = 1;
    string             hash_from  = 2;
    string             hash_to    = 3;
    repeated Operation operations = 4;
}

message GamePatch {
    string              branch_id    = 1;
    int64               created_msec = 2;
    int64               updated_msec = 3;
    string              version_from = 4;
    string              version_to   = 5;
    repeated FileChange file_changes = 6;
}

message GameBranch {
    string branch_id            = 1;
    string target_game_version  = 2;
    int64  created_msec         = 3;
    int64  updated_msec         = 4;
}

message GamePatchMetadata {
    GamePatch          game_patch = 1;
    repeated GamePatch parts      = 2;
}

message GameVersion {
    string               branch_id     = 1;
    string               hash          = 2;
    int64                size          = 3;
    int64                created_msec  = 4;
    int64                updated_msec  = 5;
    repeated TrackedFile tracked_files = 6;
}

message Operation {
    string action                        = 1;
    int64  additional_required_disk_space = 2;
    int64  offset                        = 3;
    string patch_url                     = 4;
    int64  size                          = 5;
}

message TrackedFile {
    string filename = 1;
    string hash     = 2;
}
